services:
  - type: web
    name: print3dcot-api
    runtime: node
    repo: https://github.com/DavCoder22/Print3dCot
    branch: main
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://davcoder22.github.io
